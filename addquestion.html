<!DOCTYPE html>
<html>
<head>
    <title>Add Question</title>
    <link rel="stylesheet" href="styles.css">
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css'>
</head>

<body>
    <header class="main-header">
        <div class="logo"><a href="mainpageservlet">ClassClick</a></div>
        <a href="logoutservlet"><i class="fa-solid fa-right-from-bracket" style='font-size:24px; color:white'></i></a>
    </header>


    <div class="form-container">
        <h2>Add Question to <!-- SET_NAME --></h2>
        <p class="question-counter">Question <!-- QUESTION_NUMBER --> in this set</p>
 
        <form method="post" action="addquestion">
            <input type="hidden" name="setId" value="<!-- SET_ID -->">

            <div class="form-group">
                <label for="questionText">Question Text</label>
                <textarea id="questionText" name="questionText" rows="3" required></textarea>
            </div>

            <div class="form-group">
                <label for="optionA">Option A</label>
                <input type="text" id="optionA" name="optionA" required>
            </div>

            <div class="form-group">
                <label for="optionB">Option B</label>
                <input type="text" id="optionB" name="optionB" required>
            </div>

            <div class="form-group">
                <label for="optionC">Option C</label>
                <input type="text" id="optionC" name="optionC" required>
            </div>

            <div class="form-group">
                <label for="optionD">Option D</label>
                <input type="text" id="optionD" name="optionD" required>
            </div>

            <div class="form-group">
                <label>Correct Answer</label>
                <select name="correctOption" required>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                </select>
            </div>

            <div class="button-row">
                <button type="submit" class="secondary-btn" name="action" value="addAnother">Add Another Question</button>
                <button type="submit" class="primary-btn" name="action" value="finish">Finish & Review Set</button>
            </div>
        </form>
    </div>
</body>
</html>
