<!DOCTYPE html>
<html>
<head>
    <title>Question</title>
    <link rel="stylesheet" href="styles.css">
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css'>
</head>

<body>
    <header class="main-header">
        <div class="logo"><a href="mainpageservlet">Clicker</a></div>
        <a href="logoutservlet"><i class="fa-solid fa-right-from-bracket" style='font-size:24px; color:white'></i></a>
    </header>

    <h2>Question <!-- QINDEX --> of <!-- TOTAL --></h2>

    <div class="question-container">
        <div class="question-text"><!-- QUESTION_TEXT --></div>
        <div class="options">
            <!-- OPTIONS -->
        </div>
    </div>

    <div class="nav-buttons">
        <form method="get" action="displayquestion" style="display:inline;">
            <input type="hidden" name="setId" value="<!-- SET_ID -->">
            <input type="hidden" name="qIndex" value="<!-- PREV -->">
            <button type="submit" class="nav-btn" <!-- PREV_DISABLED --> >Previous</button>
        </form>

        <!-- Next button (disabled if last question) -->
        <form method="get" action="displayquestion" style="display:inline;">
            <input type="hidden" name="setId" value="<!-- SET_ID -->">
            <input type="hidden" name="qIndex" value="<!-- NEXT -->">
            <button type="submit" class="nav-btn" <!-- NEXT_DISABLED --> >Next</button>
        </form>

        <!-- Finish button (only visible if last question) -->
        <!-- FINISH == true -->
        <form method="get" action="displayquestion" style="display:inline;" id="finishForm">
            <input type="hidden" name="setId" value="<!-- SET_ID -->">
            <input type="hidden" name="qIndex" value="<!-- NEXT -->">
            <input type="hidden" name="finish" value="true">
            <button type="submit" class="finish-btn">Finish & Show Statistics</button>
        </form>
    </div>

</body>
</html>
