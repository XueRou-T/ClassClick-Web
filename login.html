<html>
<head>
    <title>Clicker App Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header-login">
        <div class="logo">ClassClick</div>
        <div>Login</div>
    </header>

    <div class="login-container">
        <img src="images/classclick.png" alt="Logo" class="login-logo">

        <form id="loginForm">
            <table>
                <tr>
                    <td>Username</td>
                    <td><input type="text" id="username" name="username" placeholder="Username" required></td>
                </tr>
                <tr>
                    <td>Password</td>
                    <td><input type="password" id="password" name="password" placeholder="Password" required></td>
                </tr>
                <tr>
                    <td colspan="2"><button type="submit">Login</button></td>
                </tr>
                <tr>
                    <td colspan="2">Don't have an account? <a href="signup.html">Sign up here</a></td>
                </tr>
            </table>
        </form>

        <!-- Error message placeholder -->
        <div id="error-message" class="login-error-message" style="display:none;"></div>
    </div>

    <script>
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
        e.preventDefault(); // stop normal form submission

        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");

        const res = await fetch("loginservlet", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: "username=" + encodeURIComponent(usernameInput.value) +
                  "&password=" + encodeURIComponent(passwordInput.value)
        });

        const text = await res.text();

        if (text === "SUCCESS") {
            // redirect to main page
            window.location.href = "mainpageservlet";
        } else {
            // show error message and clear inputs
            const errorDiv = document.getElementById("error-message");
            errorDiv.textContent = text;
            errorDiv.style.display = "block";

            usernameInput.value = "";
            passwordInput.value = "";
        }
    });
    </script>
</body>
</html>
