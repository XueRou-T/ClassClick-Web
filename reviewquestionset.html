<!DOCTYPE html>
<html>
<head>
    <title>Review Question Set</title>
    <link rel="stylesheet" href="styles.css">
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css'>
</head>


<body>
    <header class="main-header">
        <div class="logo"><a href="mainpageservlet">Clicker</a></div>
        <a href="logoutservlet"><i class="fa-solid fa-right-from-bracket" style='font-size:24px; color:white'></i></a>
    </header>

    
    <div class="questions-overview">
        <h2>Review: <!-- SET_NAME --></h2>

        <!-- Example Question Card -->
        <div class="review-question" id="q-101">
            <div class="review-question-header">
                <h3>Question 1</h3>
                <a class="edit-link" onclick="toggleEditForm(101)">Edit</a>
            </div>

            <div class="card-body">
                <p class="question-text"><strong>Q:</strong> What is 2 + 2?</p>
                <ul class="choices-list">
                    <li class="choice-item">A: 3</li>
                    <li class="choice-item correct">B: 4</li>
                    <li class="choice-item">C: 5</li>
                    <li class="choice-item">D: 6</li>
                </ul>
            </div>

            <!-- Hidden edit form -->
            <form id="editForm-101" style="display:none;" class="edit-form">
                <h4>Edit Question</h4>
                <input type="hidden" name="questionId" value="101">
                <input type="hidden" name="setId" value="10">

                <div class="form-group">
                    <label for="questionText-101">Question Text</label>
                    <textarea id="questionText-101" name="questionText" rows="3">What is 2 + 2?</textarea>
                </div>

                <div class="form-group">
                    <label for="optionA-101">Option A</label>
                    <input type="text" id="optionA-101" name="optionA" value="3">
                </div>

                <div class="form-group">
                    <label for="optionB-101">Option B</label>
                    <input type="text" id="optionB-101" name="optionB" value="4">
                </div>

                <div class="form-group">
                    <label for="optionC-101">Option C</label>
                    <input type="text" id="optionC-101" name="optionC" value="5">
                </div>

                <div class="form-group">
                    <label for="optionD-101">Option D</label>
                    <input type="text" id="optionD-101" name="optionD" value="6">
                </div>

                <div class="form-group">
                    <label for="correctOption-101">Correct Answer</label>
                    <select id="correctOption-101" name="correctOption">
                        <option value="A">A</option>
                        <option value="B" selected>B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="button" class="primary-btn" onclick="saveQuestion(101)">Save</button>
                </div>
            </form>

            <div class="question-actions">
                <button type="button" class="delete-btn" onclick="deleteQuestion(101, 10)">🗑 Delete</button>
            </div>
        </div>

        <form method="get" action="mainpageservlet">
            <button type="submit" class="primary-btn">Confirm & Return</button>
        </form>
    </div>

    <script>
    function toggleEditForm(qid) {
        const form = document.getElementById("editForm-" + qid);
        form.style.display = form.style.display === "none" ? "block" : "none";
    }
    function saveQuestion(qid) {
        const form = document.getElementById("editForm-" + qid);
        const data = new URLSearchParams(new FormData(form));
        fetch("updatequestion", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: data
        }).then(res => {
            if (res.ok) location.reload();
            else alert("Failed to update question.");
        });
    }
    function deleteQuestion(qid, setId) {
        if (!confirm("Are you sure you want to delete this question?")) return;
        fetch("deletequestion", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: "questionId=" + qid + "&setId=" + setId
        }).then(res => {
            if (res.ok) document.getElementById("q-" + qid).remove();
            else alert("Failed to delete question.");
        });
    }
    </script>

    </body>
</html>
