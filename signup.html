<html>
    <head>
        <title>Our Web Project</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <script>
        const params = new URLSearchParams(window.location.search);
        const msg = params.get("msg");

        if (msg === "failed") {
            alert("Signup failed. Username already exists.");
        }
    </script>
    <body>
        <header class="header-login">
            <div class="logo">ClassClick</div>

            <div>Sign Up</div>
        </header>

        <div class="login-container">
            <form action="http://localhost:9999/clicker/signupservlet" method="POST">
                <table>
                    <tr>
                        <td>Username*</td>
                        <td><input type="text" name="username" placeholder="Username" required></td>
                    </tr>
                    <tr>
                        <td>Password*</td>
                        <td><input type="password" name="password" placeholder="Password" required></td>
                    </tr>
                    <tr>
                        <td>Display Name*</td>
                        <td><input type="text" name="displayname" placeholder="Display Name" required></td>
                    </tr>
                    <tr>
                        <td>Instructor or Student?</td>
                        <td>
                            <select name="usertype">
                                <option value="student">Student</option>
                                <option value="instructor">Instructor</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2"><button type="submit">Sign Up</button></td>
                    </tr>
                    <tr>
                        <td colspan="2">Have an account? <a href="login.html">Login here</a></td>
                    </tr>
                </table>
            </form>
        </div>
    </body>
</html>
