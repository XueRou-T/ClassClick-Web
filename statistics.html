<!DOCTYPE html>
<html>
<head>
    <title>Statistics</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<header class="main-header">
    <div class="logo">Clicker</div>
</header>

<h2>Question <!-- QINDEX --> of <!-- TOTAL --></h2>

<div class="question-container">
    <div class="question-text"><!-- QUESTION_TEXT --></div>
    <ul class="choices-list">
        <!-- OPTIONS -->
    </ul>
    <!-- CHART_DATA -->
</div>

<div class="nav-buttons">
    <form method="get" action="statistics" style="display:inline;">
        <input type="hidden" name="setId" value="<!-- SET_ID -->">
        <input type="hidden" name="qIndex" value="<!-- PREV -->">
        <button type="submit" class="nav-btn" <!-- PREV_DISABLED --> >Previous</button>
    </form>

    <form method="get" action="statistics" style="display:inline;">
        <input type="hidden" name="setId" value="<!-- SET_ID -->">
        <input type="hidden" name="qIndex" value="<!-- NEXT -->">
        <button type="submit" class="nav-btn" <!-- NEXT_DISABLED --> >Next</button>
    </form>

    <!-- RETURN_BUTTON -->
</div>

</body>
</html>
